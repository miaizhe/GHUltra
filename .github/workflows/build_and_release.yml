name: Build and Release

on:
  push:
    branches:
      - main
  schedule:
    # 每天周一的 00:00 (UTC 时间，约北京时间 08:00) 自动运行
    - cron: '0 0 * * 1'
  workflow_dispatch: # 允许在 GitHub Actions 页面手动触发工作流，方便测试

permissions:
  contents: write # 允许工作流创建和修改 Release

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE }}" > release.keystore.b64
          # 先清理所有的回车和换行等空白符，然后再进行标准解码
          tr -d '\n\r\t ' < release.keystore.b64 > clean.b64
          base64 -d clean.b64 > android/app/release.keystore

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release || {
            echo "::error::Build failed, printing daemon logs..."
            find ~/.gradle/daemon -name "*.out.log" -exec cat {} + || true
            exit 1
          }
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Archive Android log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-logs
          path: |
            ~/.gradle/daemon/**/daemon-*.out.log
            ~/.gradle/workers/**/worker-*.out.log
            android/app/build/reports/
          retention-days: 1

      - name: List outputs (Debug)
        run: ls -la build/app/outputs/flutter-apk/

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Compress Windows build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath GHUltra-Windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: GHUltra-Windows.zip

  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Compress macOS build
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../GHUltra-macOS.zip ghultra.app
          cd ../../../../../

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: GHUltra-macOS.zip

  release:
    name: Create GitHub Release
    needs: [build-android, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # 只需要最新的提交信息即可

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: artifacts/windows

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-zip
          path: artifacts/macos

      - name: Generate Release Info
        id: release_info
        run: |
          # 获取当前日期，格式例如 2024.05.20
          echo "DATE=$(date +'%Y.%m.%d')" >> $GITHUB_ENV
          # 获取最新的提交信息的第一行
          echo "COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1)" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ env.DATE }}
          name: 自动发布版 ${{ env.DATE }}
          body: |
            ## 🚀 每周自动构建发布
            
            📅 **打包日期**: ${{ env.DATE }}
            📝 **最新提交**: ${{ env.COMMIT_MSG }}
            
            包含 Android (APK)、Windows (ZIP) 和 macOS (ZIP) 的安装包。
          files: |
            artifacts/android/app-release.apk
            artifacts/windows/GHUltra-Windows.zip
            artifacts/macos/GHUltra-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
